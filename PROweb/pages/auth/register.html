<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – TechPro Institute</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
  <style>body{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 50%,#1a56db 100%);min-height:100vh;display:flex;flex-direction:column}.auth-page{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}.auth-card{background:rgba(255,255,255,0.98);border-radius:1.5rem;padding:2.5rem;width:100%;max-width:640px;box-shadow:0 30px 60px rgba(0,0,0,0.3)}.dark-mode .auth-card{background:rgba(31,41,55,0.98)}.role-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem;margin-bottom:2rem;background:var(--bg-2);padding:0.375rem;border-radius:var(--radius-lg)}.role-tab{padding:0.625rem;border-radius:var(--radius);font-size:0.875rem;font-weight:600;color:var(--text-muted);text-align:center;cursor:pointer;transition:var(--transition)}.role-tab.active{background:var(--primary);color:#fff}</style>
</head>
<body>
  <nav id="navbar" style="background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,0.1)"><div class="container"><div class="navbar-inner"><a href="../../index.html" class="logo" style="color:#fff"><div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/></svg></div>TechPro<span style="color:var(--accent)"> Institute</span></a><div style="display:flex;gap:1rem;align-items:center"><button class="dark-toggle" style="color:rgba(255,255,255,0.8);border-color:rgba(255,255,255,0.2)"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg></button><a href="login.html" class="btn btn-outline-white btn-sm">Login</a></div></div></div></nav>

  <div class="auth-page">
    <div style="width:100%;max-width:640px">
      <div style="text-align:center;margin-bottom:1.5rem;color:#fff">
        <div style="width:4rem;height:4rem;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:1rem;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:1.75rem">&#10024;</div>
        <h1 style="font-size:1.75rem;font-weight:900;margin-bottom:0.25rem">Create Account</h1>
        <p style="opacity:0.8">Join TechPro Institute today</p>
      </div>
      <div class="auth-card">
        <div class="role-tabs">
          <div class="role-tab" onclick="showForm('student')">&#127891; Student</div>
          <div class="role-tab active" onclick="showForm('franchise')">&#127962; Franchise</div>
          <div class="role-tab" onclick="showForm('staff')">&#128100; Staff</div>
        </div>

        <!-- Student Form -->
        <form id="form-student" style="display:none" onsubmit="handleRegister(event)">
          <h3 style="font-weight:700;margin-bottom:1.5rem">Student Registration</h3>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-control" placeholder="Aarav Sharma" required></div>
            <div class="form-group"><label class="form-label">Date of Birth *</label><input type="date" class="form-control" required></div>
            <div class="form-group"><label class="form-label">Mobile Number *</label><input type="tel" class="form-control" placeholder="9876543210" required></div>
            <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-control" placeholder="student@email.com"></div>
            <div class="form-group"><label class="form-label">Select Course *</label><select class="form-control" required><option value="">-- Select Course --</option></select></div>
            <div class="form-group"><label class="form-label">Franchise Center *</label><select class="form-control" required><option value="">-- Select Center --</option></select></div>
            <div class="form-group"><label class="form-label">Father's Name *</label><input type="text" class="form-control" placeholder="Father's full name" required></div>
            <div class="form-group"><label class="form-label">Gender *</label><select class="form-control" required><option value="">Select Gender</option><option>Male</option><option>Female</option><option>Other</option></select></div>
          </div>
          <div class="form-group"><label class="form-label">Address *</label><textarea class="form-control" rows="2" placeholder="Full address with city, state, pincode" required></textarea></div>
          <div class="form-group"><label class="form-label">Password *</label><input type="password" class="form-control" placeholder="Create a strong password" required></div>
          <label class="checkbox-label" style="margin-bottom:1.5rem"><input type="checkbox" required> I agree to the <a href="#" style="color:var(--primary)">Terms & Conditions</a></label><br><br>
          <button type="submit" class="btn btn-primary w-full btn-lg">Register as Student</button>
        </form>

        <!-- Franchise Form -->
        <form id="form-franchise" onsubmit="handleRegister(event)">
          <h3 style="font-weight:700;margin-bottom:1.5rem">Franchise Center Registration</h3>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Center Name *</label><input type="text" class="form-control" placeholder="TechPro [City]" required></div>
            <div class="form-group"><label class="form-label">Owner Name *</label><input type="text" class="form-control" placeholder="Full name" required></div>
            <div class="form-group"><label class="form-label">Mobile Number *</label><input type="tel" class="form-control" placeholder="9876543210" required></div>
            <div class="form-group"><label class="form-label">Email Address *</label><input type="email" class="form-control" placeholder="center@email.com" required></div>
            <div class="form-group"><label class="form-label">City *</label><input type="text" class="form-control" placeholder="City" required></div>
            <div class="form-group"><label class="form-label">State *</label><select class="form-control" required><option value="">Select State</option><option>Uttar Pradesh</option><option>Delhi</option><option>Rajasthan</option><option>Maharashtra</option><option>Madhya Pradesh</option><option>Bihar</option><option>Gujarat</option><option>Haryana</option><option>West Bengal</option><option>Tamil Nadu</option></select></div>
            <div class="form-group"><label class="form-label">Pincode *</label><input type="text" class="form-control" placeholder="201301" required maxlength="6"></div>
            <div class="form-group"><label class="form-label">Space Available (sq ft)</label><input type="number" class="form-control" placeholder="500"></div>
          </div>
          <div class="form-group"><label class="form-label">Full Address *</label><textarea class="form-control" rows="2" placeholder="Complete address" required></textarea></div>
          <div class="form-group"><label class="form-label">Password *</label><input type="password" class="form-control" placeholder="Create a strong password" required></div>
          <label class="checkbox-label" style="margin-bottom:1.5rem"><input type="checkbox" required> I agree to the Franchise <a href="#" style="color:var(--primary)">Terms & Conditions</a></label><br><br>
          <button type="submit" class="btn btn-primary w-full btn-lg">Apply for Franchise</button>
        </form>

        <!-- Staff Form -->
        <form id="form-staff" style="display:none" onsubmit="handleRegister(event)">
          <h3 style="font-weight:700;margin-bottom:1.5rem">Staff Registration</h3>
          <div class="form-grid">
            <div class="form-group"><label class="form-label">Full Name *</label><input type="text" class="form-control" placeholder="Staff name" required></div>
            <div class="form-group"><label class="form-label">Employee ID *</label><input type="text" class="form-control" placeholder="EMP001" required></div>
            <div class="form-group"><label class="form-label">Department</label><select class="form-control"><option>Administration</option><option>Academics</option><option>IT</option><option>Finance</option></select></div>
            <div class="form-group"><label class="form-label">Mobile *</label><input type="tel" class="form-control" required></div>
          </div>
          <div class="form-group"><label class="form-label">Work Email *</label><input type="email" class="form-control" placeholder="staff@techpro.edu.in" required></div>
          <div class="form-group"><label class="form-label">Password *</label><input type="password" class="form-control" required></div>
          <button type="submit" class="btn btn-primary w-full btn-lg">Register Staff</button>
        </form>

        <p style="text-align:center;font-size:0.9rem;color:var(--text-muted);margin-top:1.5rem">Already have an account? <a href="login.html" style="color:var(--primary);font-weight:600">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="../../data/dummy.js"></script><script src="../../assets/js/main.js"></script>
  <script>
    // Populate dropdowns
    const courseSelect = document.querySelector('form#form-student select:first-of-type');
    const centerSelect = document.querySelector('form#form-student select:nth-of-type(2)');
    if (courseSelect) DATA.courses.forEach(c => { const o = document.createElement('option'); o.value = c.id; o.textContent = c.name; courseSelect.appendChild(o); });
    if (centerSelect) DATA.franchiseCenters.forEach(f => { const o = document.createElement('option'); o.value = f.id; o.textContent = f.name + ', ' + f.city; centerSelect.appendChild(o); });

    function showForm(role) {
      document.querySelectorAll('.role-tab').forEach((t,i) => { t.classList.remove('active'); if(['student','franchise','staff'][i]===role) t.classList.add('active'); });
      ['student','franchise','staff'].forEach(r => document.getElementById('form-'+r).style.display = r===role?'block':'none');
    }
    showForm('franchise');

    function handleRegister(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const orig = btn.innerHTML;
      btn.innerHTML = '<span class="spinner" style="width:1.25rem;height:1.25rem;border-width:2px;border-color:#fff;border-top-color:transparent"></span> Processing...';
      btn.disabled = true;
      setTimeout(() => {
        btn.innerHTML = orig; btn.disabled = false;
        showToast('Registration successful! Please wait for approval.', 'success');
        setTimeout(() => window.location.href = 'login.html', 2000);
      }, 2000);
    }
  </script>
</body>
</html>
